name: iOS Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-tests.yml"
      - "ios/STRQ.xcodeproj/**"
      - "ios/STRQ/**"
      - "ios/STRQTests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  progress-muscle-coverage:
    name: Progress Muscle Coverage Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 16.4 if available
        shell: bash
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            echo "Xcode 16.4 not found; using default Xcode."
          fi
          xcodebuild -version

      - name: List Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project ios/STRQ.xcodeproj

      - name: List available simulators
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list devices available

      - name: Run Progress Muscle Coverage tests
        shell: bash
        run: |
          set -euo pipefail

          if xcrun simctl list devices available | grep -q "iPhone 16 ("; then
            destination="platform=iOS Simulator,name=iPhone 16"
          else
            device_name="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone [0-9]+/ { print $1; exit }' | xargs)"
            if [ -z "$device_name" ]; then
              echo "No available iPhone simulator found."
              exit 1
            fi
            destination="platform=iOS Simulator,name=${device_name}"
          fi

          echo "Using destination: ${destination}"
          simulator_arch="$(uname -m)"
          echo "Building simulator architecture: ${simulator_arch}"

          xcodebuild test \
            -project ios/STRQ.xcodeproj \
            -scheme STRQ \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${destination}" \
            -only-testing:STRQTests/ProgressMuscleCoverageCalculatorTests \
            ARCHS="${simulator_arch}" \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO
